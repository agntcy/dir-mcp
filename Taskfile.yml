version: "3"

vars:
  BIN_DIR: ./.bin
  GOLANGCI_LINT_VERSION: "2.11.3"
  GOLANGCI_LINT_BIN: "{{ .BIN_DIR }}/golangci-lint-{{ .GOLANGCI_LINT_VERSION }}"
  IMAGE_REPO: '{{ .IMAGE_REPO | default "ghcr.io/agntcy/dir-mcp" }}'
  IMAGE_TAG: '{{ .IMAGE_TAG | default "latest" }}'
  RENOVATE_VERSION: "43.89.5"

tasks:
  default:
    desc: Show available tasks
    cmd: task --list

  build:
    desc: Build the MCP server binary
    vars:
      GOOS: "{{ .GOOS | default OS }}"
      GOARCH: "{{ .GOARCH | default ARCH }}"
      OUT_BINARY: "{{ .BIN_DIR }}/mcp-server"
    cmds:
      - mkdir -p {{ .BIN_DIR }}
      - CGO_ENABLED=0 GOOS={{.GOOS}} GOARCH={{.GOARCH}} go build -o "{{.OUT_BINARY}}" main.go

  docker:build:
    desc: Build the Docker image
    cmds:
      - docker build -t {{ .IMAGE_REPO }}:{{ .IMAGE_TAG }} .

  test:
    desc: Run all tests (unit + e2e)
    cmds:
      - task: test:unit
      - task: test:e2e

  test:unit:
    desc: Run unit tests
    cmds:
      - go test -count=1 ./...

  test:e2e:
    desc: Run e2e tests
    dir: tests/e2e
    env:
      OASF_API_VALIDATION_SCHEMA_URL: '{{ .OASF_API_VALIDATION_SCHEMA_URL | default "https://schema.oasf.outshift.com" }}'
    cmds:
      - go test -v -timeout 5m ./...

  lint:
    desc: Run linters
    deps:
      - deps:golangci-lint
    cmds:
      - "{{ .GOLANGCI_LINT_BIN }} run ./..."

  license:
    desc: Run license check
    cmds:
      - licensei cache
      - licensei check

  pre-commit:golangci-lint:
    desc: Run golangci-lint pre-commit hook
    cmds:
      - golangci-lint run --fix {{.CLI_ARGS | default "./..."}}

  deps:
    desc: Install development dependencies and git hooks
    cmds:
      - pre-commit install
    status:
      - test -f .git/hooks/pre-commit

  deps:bin-dir:
    internal: true
    cmds:
      - mkdir -p {{ .BIN_DIR }}
    status:
      - test -d {{ .BIN_DIR }}

  deps:golangci-lint:
    desc: Install golangci-lint
    internal: true
    deps:
      - deps:bin-dir
    cmds:
      - curl -sSfL https://golangci-lint.run/install.sh | sh -s -- -b {{ .BIN_DIR }} v{{ .GOLANGCI_LINT_VERSION }}
      - mv {{ .BIN_DIR }}/golangci-lint {{ .GOLANGCI_LINT_BIN }}
      - chmod +x {{ .GOLANGCI_LINT_BIN }}
    status:
      - test -x {{ .GOLANGCI_LINT_BIN }}

  deps:renovate:
    desc: Install Renovate
    internal: true
    cmds:
      - npm install -g renovate@{{ .RENOVATE_VERSION }}
    status:
      - npm list -g renovate

  deps:renovate:sync:
    desc: Sync dependencies with Renovate
    summary: |
      For extra CLI flags pass RENOVATE_OPTS (e.g. task deps:renovate:sync RENOVATE_OPTS='--dry-run').
      Default platform is local so local runs do not touch remote project data.
      GitHub Actions CI sets RENOVATE_PLATFORM to github.
      This step is only analytical without a GitHub token and will not update PRs or project data.
    deps:
      - deps:renovate
    vars:
      RENOVATE_OPTS_DEFAULT: >-
        --persist-repo-data 'true'
        --allowed-post-upgrade-commands '[".*"]'
        --post-upgrade-tasks '{"commands": ["go mod tidy"], "executionMode": "branch"}'
      RENOVATE_OPTS: "{{ .RENOVATE_OPTS | default .RENOVATE_OPTS_DEFAULT }}"
      RENOVATE_PLATFORM_EFFECTIVE:
        sh: printf '%s' "${RENOVATE_PLATFORM:-local}"
    cmds:
      - renovate {{ .RENOVATE_OPTS }} --platform "{{ .RENOVATE_PLATFORM_EFFECTIVE }}"

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf {{ .BIN_DIR }}
