version: "3"

vars:
  BIN_DIR: ./.bin
  IMAGE_REPO: '{{ .IMAGE_REPO | default "ghcr.io/agntcy/dir-mcp" }}'
  IMAGE_TAG: '{{ .IMAGE_TAG | default "latest" }}'

tasks:
  default:
    desc: Show available tasks
    cmd: task --list

  build:
    desc: Build the MCP server binary
    vars:
      GOOS: "{{ .GOOS | default OS }}"
      GOARCH: "{{ .GOARCH | default ARCH }}"
      OUT_BINARY: "{{ .BIN_DIR }}/mcp-server"
    cmds:
      - mkdir -p {{ .BIN_DIR }}
      - CGO_ENABLED=0 GOOS={{.GOOS}} GOARCH={{.GOARCH}} go build -o "{{.OUT_BINARY}}" main.go

  docker:build:
    desc: Build the Docker image
    cmds:
      - docker build -t {{ .IMAGE_REPO }}:{{ .IMAGE_TAG }} .

  test:
    desc: Run all tests (unit + e2e)
    cmds:
      - task: test:unit
      - task: test:e2e

  test:unit:
    desc: Run unit tests
    cmds:
      - go test -count=1 ./...

  test:e2e:
    desc: Run e2e tests
    dir: tests/e2e
    env:
      OASF_API_VALIDATION_SCHEMA_URL: '{{ .OASF_API_VALIDATION_SCHEMA_URL | default "https://schema.oasf.outshift.com" }}'
    cmds:
      - go test -v -timeout 5m ./...

  lint:
    desc: Run linters
    cmds:
      - golangci-lint run ./...

  license:
    desc: Run license check
    cmds:
      - licensei cache
      - licensei check

  pre-commit:golangci-lint:
    desc: Run golangci-lint pre-commit hook
    cmds:
      - golangci-lint run --fix {{.CLI_ARGS | default "./..."}}

  deps:
    desc: Install development dependencies and git hooks
    cmds:
      - pre-commit install
    status:
      - test -f .git/hooks/pre-commit

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf {{ .BIN_DIR }}
